openapi:
  nativeScrollbars: true
  requiredPropsFirst: true
  sortPropsAlphabetically: false
  theme:
    colors:
      primary:
        main: "#4f8d33"
        light: "#9fe870"
        dark: "#2b551a"
        contrastText: "#10231a"
      success:
        main: "#4f8d33"
      text:
        primary: "#10231a"
        secondary: "#526057"
      border:
        light: "#dfe8dd"
        dark: "#b7c7b3"
      http:
        get: "#2563eb"
        post: "#4f8d33"
        put: "#b7791f"
        patch: "#7c3aed"
        delete: "#dc2626"
    typography:
      fontFamily: "Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      fontSize: "15px"
      lineHeight: "1.65"
      fontWeightRegular: "400"
      fontWeightBold: "700"
      headings:
        fontFamily: "Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        fontWeight: "700"
        lineHeight: "1.15"
      heading1:
        color: "#10231a"
        fontSize: "2.8rem"
        fontWeight: "750"
      heading2:
        color: "#10231a"
        fontWeight: "700"
      heading3:
        color: "#10231a"
        fontWeight: "700"
      links:
        color: "#2b551a"
        hover: "#4f8d33"
        visited: "#2b551a"
    sidebar:
      backgroundColor: "#f7faf6"
      activeBgColor: "#e0f9cf"
      activeTextColor: "#2b551a"
      textColor: "#405047"
      separatorLabelColor: "#738079"
      rightLineColor: "#dfe8dd"
      width: "290px"
    rightPanel:
      backgroundColor: "#0b1f14"
      panelBackgroundColor: "#10291b"
      panelControlsBackgroundColor: "#183724"
      textColor: "#e8f2eb"
      width: "40%"
    codeBlock:
      backgroundColor: "#10291b"
      borderRadius: "12px"
    shape:
      borderRadius: "10px"
    logo:
      gutter: "28px"
      maxHeight: "30px"
      maxWidth: "152px"
